<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Países y conversión</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
padding:0;
background: linear-gradient(135deg,#0f3d2e,#021b14);
color:white;
text-align:center;
}

/* contenedor */

.container{
background:white;
color:#1b3b2f;
width:90%;
max-width:700px;
margin:60px auto;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* titulo */

h1{
color:#0f5132;
margin-bottom:5px;
}

/* inputs */

input{
padding:10px;
width:80%;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

/* botones */

button{
background:silver;
border:none;
padding:10px 18px;
margin:5px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0f5132;
color:white;
}

/* resultados */

.result{
margin-top:20px;
font-size:18px;
}

/* firma */

.firma{
margin-top:40px;
font-size:18px;
font-weight:bold;
color:silver;
text-shadow:0 0 8px #7fff9a;
}

</style>
</head>

<body>

<div class="container">

<h1>Países y conversión</h1>
<p>Buscar por país o código ISO</p>

<input id="busqueda" placeholder="Ej: Costa Rica o CR">

<br>

<button onclick="buscar()">Buscar</button>

<div class="result" id="resultado"></div>

<hr>

<h3>Conversión de moneda</h3>

<input id="montoLocal" placeholder="Monto moneda local">

<button onclick="convertirUSD()">Moneda → USD</button>

<br>

<input id="montoUSD" placeholder="Monto en USD">

<button onclick="convertirLocal()">USD → Moneda</button>

<div class="result" id="conversion"></div>

<br><br>

<button onclick="window.history.back()">Volver</button>

<button onclick="window.open('https://www.iban.com/country-codes')">
Consulta códigos país
</button>

<div class="firma">✨ ECB ✨</div>

</div>

<script>

const paises={
CR:{pais:"Costa Rica",continente:"América",moneda:"Colón",codigo:"CRC",rate:540},
MX:{pais:"México",continente:"América",moneda:"Peso mexicano",codigo:"MXN",rate:17},
BR:{pais:"Brasil",continente:"América",moneda:"Real",codigo:"BRL",rate:5},
AR:{pais:"Argentina",continente:"América",moneda:"Peso argentino",codigo:"ARS",rate:900},
ES:{pais:"España",continente:"Europa",moneda:"Euro",codigo:"EUR",rate:0.92},
US:{pais:"Estados Unidos",continente:"América",moneda:"Dólar",codigo:"USD",rate:1}
};

let paisActual=null;

function buscar(){

let valor=document.getElementById("busqueda").value.toUpperCase();

for(let code in paises){

if(code===valor || paises[code].pais.toUpperCase()===valor){

paisActual=paises[code];

document.getElementById("resultado").innerHTML=

"<b>País:</b> "+paisActual.pais+"<br>"+
"<b>Código:</b> "+code+"<br>"+
"<b>Continente:</b> "+paisActual.continente+"<br>"+
"<b>Moneda:</b> "+paisActual.moneda+" ("+paisActual.codigo+")";

return;

}

}

document.getElementById("resultado").innerHTML="País no encontrado";

}

function convertirUSD(){

if(!paisActual){alert("Busca un país primero");return;}

let monto=document.getElementById("montoLocal").value;

let usd=monto/paisActual.rate;

document.getElementById("conversion").innerHTML=
monto+" "+paisActual.codigo+" = "+usd.toFixed(2)+" USD";

}

function convertirLocal(){

if(!paisActual){alert("Busca un país primero");return;}

let monto=document.getElementById("montoUSD").value;

let local=monto*paisActual.rate;

document.getElementById("conversion").innerHTML=
monto+" USD = "+local.toFixed(2)+" "+paisActual.codigo;

}

</script>

</body>
</html>
