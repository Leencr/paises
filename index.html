<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Países y conversión</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom right,#052e16,#064e3b);
color:#e0f7ef;
min-height:100vh;
padding:30px 20px;
overflow:hidden;
}

/* estrellas */

.star{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:radial-gradient(circle,#10b981,transparent);
animation:twinkle 3s infinite alternate;
opacity:0.8;
}

.star.silver{
background:radial-gradient(circle,#d1d5db,transparent);
}

@keyframes twinkle{
from{transform:scale(1);opacity:.7;}
to{transform:scale(1.5);opacity:1;}
}

/* título */

h1{
text-align:center;
font-size:1.8rem;
margin-bottom:6px;
background:linear-gradient(90deg,#34d399,#d1d5db);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#a7f3d0;
font-size:.9rem;
margin-bottom:28px;
}

/* card (igual que marketplaces) */

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(52,211,153,.3);
border-radius:16px;
padding:24px;
max-width:700px;
margin:0 auto 24px auto;
backdrop-filter:blur(10px);
}

label{
display:block;
font-size:.85rem;
color:#34d399;
margin-bottom:6px;
font-weight:600;
}

input,select{
width:100%;
padding:12px 16px;
border-radius:10px;
border:1px solid rgba(52,211,153,.3);
background:rgba(0,0,0,.3);
color:#e0f7ef;
font-size:1rem;
}

.search-row{
display:flex;
gap:12px;
margin-bottom:16px;
}

.search-row>div{flex:1;}

button{
width:100%;
padding:13px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#065f46,#34d399);
color:white;
font-size:1rem;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.result-box{
display:none;
margin-top:20px;
background:rgba(52,211,153,.08);
border:1px solid rgba(52,211,153,.25);
border-radius:12px;
padding:20px;
}

.result-box.visible{display:block;}

.result-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:16px;
}

.result-item label{
font-size:.75rem;
color:#d1d5db;
}

.result-item .value{
font-size:1.05rem;
font-weight:600;
}

.divider{
border:none;
border-top:1px solid rgba(52,211,153,.2);
margin:16px 0;
}

.converter-row{
display:flex;
gap:12px;
align-items:flex-end;
}

.converter-row>div{flex:1;}

.convert-btn{
flex:0 0 auto;
width:auto;
padding:12px 20px;
font-size:.9rem;
}

.conversion-result{
margin-top:14px;
padding:14px;
background:rgba(16,185,129,.15);
border-radius:10px;
border:1px solid rgba(16,185,129,.4);
display:none;
}

.conversion-result.visible{
display:block;
}

.amount-display{
font-size:1.4rem;
font-weight:700;
color:#34d399;
}

/* botones flotantes */

.code-button{
position:fixed;
bottom:20px;
right:20px;
}

.code-button button{
background:linear-gradient(45deg,#065f46,#34d399);
padding:10px 20px;
border-radius:8px;
box-shadow:0 0 10px rgba(16,185,129,.7);
}

.home-button{
position:fixed;
bottom:20px;
left:20px;
background:linear-gradient(45deg,#065f46,#34d399);
padding:10px 20px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
box-shadow:0 0 10px rgba(16,185,129,.7);
}

/* firma */

.footer{
position:fixed;
bottom:70px;
width:100%;
text-align:center;
color:#a7f3d0;
font-size:14px;
}

</style>
</head>

<body>

<h1>Países y conversión</h1>
<div class="subtitle">Buscar por país o código ISO</div>

<div class="card">

<div class="search-row">
<div>
<label>País o código</label>
<input id="searchInput" placeholder="Ej: Costa Rica o CR">
</div>
</div>

<button onclick="buscar()">Buscar</button>

<div class="result-box" id="resultBox">

<div class="result-grid">

<div class="result-item">
<label>País</label>
<div class="value" id="pais"></div>
</div>

<div class="result-item">
<label>Código</label>
<div class="value" id="codigo"></div>
</div>

<div class="result-item">
<label>Continente</label>
<div class="value" id="continente"></div>
</div>

<div class="result-item">
<label>Moneda</label>
<div class="value" id="moneda"></div>
</div>

</div>

<hr class="divider">

<div class="converter-row">

<div>
<label>Monto moneda local</label>
<input id="localAmount">
</div>

<button class="convert-btn" onclick="localUSD()">Local → USD</button>

</div>

<div class="converter-row" style="margin-top:10px">

<div>
<label>Monto USD</label>
<input id="usdAmount">
</div>

<button class="convert-btn" onclick="usdLocal()">USD → Local</button>

</div>

<div class="conversion-result" id="conversion"></div>

</div>

</div>

<a class="home-button" href="index.html">Volver</a>

<div class="code-button">
<button onclick="window.open('https://www.iban.com/country-codes')">
Consulta códigos país
</button>
</div>

<div class="footer">
✨ Creado con magia por ECB  
<br>
© 2025 Book Dragon Club
</div>

<script>

/* estrellas */

for(let i=0;i<40;i++){
let star=document.createElement("div");
star.className="star"+(Math.random()>0.5?" silver":"");
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
document.body.appendChild(star);
}

/* datos */

const paises={
CR:{pais:"Costa Rica",continente:"América",moneda:"Colón",rate:540},
MX:{pais:"México",continente:"América",moneda:"Peso Mexicano",rate:17},
ES:{pais:"España",continente:"Europa",moneda:"Euro",rate:0.92},
BR:{pais:"Brasil",continente:"América",moneda:"Real",rate:5}
};

let actual=null;

function buscar(){

let val=document.getElementById("searchInput").value.toUpperCase();

for(let c in paises){

if(c===val||paises[c].pais.toUpperCase()===val){

actual=paises[c];

document.getElementById("pais").innerText=actual.pais;
document.getElementById("codigo").innerText=c;
document.getElementById("continente").innerText=actual.continente;
document.getElementById("moneda").innerText=actual.moneda;

document.getElementById("resultBox").classList.add("visible");

}
}

}

function localUSD(){

let m=document.getElementById("localAmount").value;
let usd=m/actual.rate;

mostrar(m+" "+actual.moneda+" = "+usd.toFixed(2)+" USD");

}

function usdLocal(){

let m=document.getElementById("usdAmount").value;
let local=m*actual.rate;

mostrar(m+" USD = "+local.toFixed(2)+" "+actual.moneda);

}

function mostrar(txt){

let c=document.getElementById("conversion");

c.innerHTML="<div class='amount-display'>"+txt+"</div>";

c.classList.add("visible");

}

</script>

</body>
</html>
