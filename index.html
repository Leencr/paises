<style>

body{
      font-family: 'Cinzel', serif;
      background: linear-gradient(to bottom right, #052e16, #064e3b);
      color: #1e293b;
      min-height: 100vh;
      position: relative;
      padding-bottom: 120px; /* espacio para la firma */
      overflow: hidden;
    }

    /* Estrellas animadas */
    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, #10b981, transparent);
      animation: twinkle 3s infinite alternate;
      opacity: 0.8;
    }

    .star.silver {
      background: radial-gradient(circle, #d1d5db, transparent);
    }

    @keyframes twinkle {
      from { transform: scale(1); opacity: 0.7; }
      to { transform: scale(1.5); opacity: 1; }
    }

    /* Botones flotantes */
    .code-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }

    .code-button button {
      background: linear-gradient(45deg, #065f46, #34d399);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.7);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .code-button button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(16, 185, 129, 1);
    }

    .home-button {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: linear-gradient(45deg, #065f46, #34d399);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.7);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .home-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(16, 185, 129, 1);
    }

    /* Firma mágica */
    .signature {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      color: #d1fae5;
    }

    .signature .main {
      font-size: 0.9rem;
      color: #d1fae5;
      animation: glow 2s infinite alternate;
      position: relative;
    }

    .signature .sub {
      font-size: 0.7rem;
      color: rgba(209, 250, 229, 0.8);
    }

    .sparkle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: radial-gradient(circle, #10b981, #6ee7b7, transparent);
      border-radius: 50%;
      animation: sparkleAnim 2s infinite;
    }

    .sparkle.silver {
      background: radial-gradient(circle, #e5e7eb, #9ca3af, transparent);
    }

    @keyframes sparkleAnim {
      0%, 100% { transform: translateY(0) scale(1); opacity: 1; }
      50% { transform: translateY(-10px) scale(1.5); opacity: 0.6; }
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #10b981, 0 0 10px #34d399, 0 0 15px #a7f3d0; }
      to { text-shadow: 0 0 10px #10b981, 0 0 20px #34d399, 0 0 30px #a7f3d0; }

/* VARIABLES */

let actual=null;


/* BUSCAR */

function buscar(){

let texto=document.getElementById("search").value.toUpperCase();

let pais=countries.find(p=>
p[0].toUpperCase()==texto || p[1]==texto
);

if(!pais){

alert("País no encontrado");
return;

}

actual=pais;

document.getElementById("pais").innerText=pais[0];
document.getElementById("codigo").innerText=pais[1];
document.getElementById("moneda").innerText=pais[4]+" ("+pais[5]+")";

document.getElementById("resultado").classList.remove("hidden");

}


/* USD → LOCAL */

function usdLocal(){

let usd=document.getElementById("usd").value;

let rate=actual[6];

let local=usd/rate;

document.getElementById("conversion").innerText=
usd+" USD = "+local.toFixed(2)+" "+actual[5];

}


/* LOCAL → USD */

function localUSD(){

let local=document.getElementById("local").value;

let rate=actual[6];

let usd=local*rate;

document.getElementById("conversion").innerText=
local+" "+actual[5]+" = "+usd.toFixed(2)+" USD";

}

</script>
